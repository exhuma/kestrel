# Default-deny egress proxy for kestrel.
#
# Only hosts listed in /etc/squid/allowlist (generated from kestrel's own
# config by the `egress-init` step — see docker-compose.egress.yml) may be
# reached. Everything else is denied. HTTPS traffic uses CONNECT, so squid
# allowlists by hostname without seeing the tunneled bytes; the GitHub token
# and Anthropic credentials stay confidential even from this proxy.

http_port 3128

# The allowlist: one hostname per line. dstdomain matches the exact host
# (a leading dot would match subdomains — we list exact hosts instead).
acl allowed_hosts dstdomain "/etc/squid/allowlist"

# Standard safe CONNECT port policy: only tunnel to 443 (HTTPS).
acl SSL_ports port 443
acl CONNECT method CONNECT
http_access deny CONNECT !SSL_ports

# Allow requests to allowlisted hosts; deny everything else (fail closed).
http_access allow allowed_hosts
http_access deny all

# This is a security control, not a cache: do not store anything.
cache deny all

# Quieter, privacy-preserving logs.
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr
forwarded_for delete
via off
