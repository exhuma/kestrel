# Run kestrel from the published alpha image:
#   docker compose up
#
# To build from source instead, comment out `image:` and uncomment `build:`,
# then run `docker compose up --build`.
services:
  kestrel:
    image: ghcr.io/exhuma/kestrel:alpha
    # build:
    #   context: .
    #   args:
    #     VITE_API_BASE: ""
    #     VITE_GITHUB_REPO_URL: ""
    #     KESTREL_VERSION: dev
    ports:
      - "8000:8000"
    # Reach backends running on the Docker host (Ollama, `opencode serve`,
    # ...): use http://host.docker.internal:PORT in backends.toml, NOT
    # localhost — inside the container localhost is the container itself.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Surface readiness to `docker compose ps` and enable
    # `depends_on: condition: service_healthy`. Mirrors the image's own
    # HEALTHCHECK (GET /readyz, which checks the database).
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen(
          'http://127.0.0.1:8000/readyz').status==200 else 1)
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      # Persist the SQLite DB and the container's Claude HOME across restarts.
      - kestrel-data:/data
      # The git repos claude clones and edits, kept browsable on the host.
      - ./workspaces:/workspaces
      # Seed (read-only): your host Claude config is copied into the container
      # at startup so the bundled CLI has your auth, MCP servers and plugins.
      # The container never writes back to these. Note ~/.claude.json is a
      # separate FILE from the ~/.claude directory — both are needed.
      - ${HOME}/.claude:/seed/.claude:ro
      - ${HOME}/.claude.json:/seed/claude.json:ro
      # Optional: mount a backends config (see backends.toml.example) to
      # dispatch to opencode / self-hosted LLMs. Pair with the env var below.
      # - ./backends.toml:/config/backends.toml:ro
    environment:
      # The repos claude works in (matches the ./workspaces bind mount above).
      KESTREL_WORKSPACE_ROOT: /workspaces
      # Optional: a token unlocks GitHub ingestion features.
      KESTREL_GITHUB_TOKEN: ${KESTREL_GITHUB_TOKEN:-}
      # Permission mode passed to spawned claude sessions.
      KESTREL_PERMISSION_MODE: ${KESTREL_PERMISSION_MODE:-acceptEdits}
      # JSON map of model overrides, e.g. '{"sonnet":"claude-sonnet-5"}'.
      KESTREL_MODEL_OVERRIDES: ${KESTREL_MODEL_OVERRIDES:-{}}
      # Console logs: 'text' (default) or 'json' (one JSON per line) for a
      # log pipeline (OTEL, Logstash). See docs/observability.md.
      KESTREL_LOG_FORMAT: ${KESTREL_LOG_FORMAT:-text}
      # Optional: point at the mounted backends config (uncomment the volume).
      # KESTREL_BACKENDS_FILE: /config/backends.toml

volumes:
  kestrel-data:
